const DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "lang": "mix",
  "accent": "#2a6fdb",
  "density": "cozy"
}/*EDITMODE-END*/;

const ACCENTS = {
  '#2a6fdb': { a: 'oklch(48% 0.15 245)', a2: 'oklch(54% 0.15 245)', soft: 'oklch(95% 0.03 245)' },
  '#1f3a5c': { a: 'oklch(34% 0.10 250)', a2: 'oklch(40% 0.12 250)', soft: 'oklch(94% 0.025 250)' },
  '#1f8a5b': { a: 'oklch(46% 0.13 160)', a2: 'oklch(52% 0.13 160)', soft: 'oklch(95% 0.03 160)' },
  '#c47a1a': { a: 'oklch(58% 0.16 75)',  a2: 'oklch(64% 0.16 75)',  soft: 'oklch(95% 0.04 75)' },
};

function App() {
  const [t, setTweak] = useTweaks(DEFAULTS);
  const settings = { lang: t.lang, theme: t.theme };
  const tr = I18N[t.lang] || I18N.mix;

  // Apply theme + accent globally
  useEffect(() => {
    document.documentElement.dataset.theme = t.theme;
    const a = ACCENTS[t.accent] || ACCENTS.blue;
    document.documentElement.style.setProperty('--accent', a.a);
    document.documentElement.style.setProperty('--accent-2', a.a2);
    document.documentElement.style.setProperty('--accent-soft', a.soft);
  }, [t.theme, t.accent]);

  return (
    <>
      <DesignCanvas>
        <DCSection id="overview" title="KFX · Mobile-first redesign" subtitle="Tap any artboard to focus · drag to reorder">
          <DCArtboard id="rationale" label="Approach" width={420} height={844}>
            <ApproachCard />
          </DCArtboard>
          <DCArtboard id="today-m" label="01 · Today" width={390} height={844}>
            <TodayScreen t={tr} />
          </DCArtboard>
          <DCArtboard id="borrowers-m" label="02 · Borrowers" width={390} height={844}>
            <BorrowersScreen t={tr} />
          </DCArtboard>
          <DCArtboard id="detail-m" label="03 · Borrower detail" width={390} height={844}>
            <BorrowerDetail t={tr} />
          </DCArtboard>
          <DCArtboard id="money-m" label="04 · Money" width={390} height={844}>
            <MoneyScreen t={tr} />
          </DCArtboard>
          <DCArtboard id="settings-m" label="05 · Settings" width={390} height={844}>
            <SettingsScreen t={tr} settings={settings} setS={setTweak} />
          </DCArtboard>
          <DCArtboard id="bayad-sheet" label="06 · Record bayad" width={390} height={844}>
            <AddBayadSheet t={tr} />
          </DCArtboard>
        </DCSection>

        <DCSection id="desktop" title="Desktop · same data model, sidebar layout" subtitle="One codebase responds to viewport size">
          <DCArtboard id="desktop-today" label="Desktop · Today" width={1280} height={800}>
            <DesktopApp t={tr} activeTab="today" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Visual">
          <TweakRadio label="Theme" value={t.theme} options={[{value:'light',label:'Light'},{value:'dark',label:'Dark'}]} onChange={v => setTweak('theme', v)} />
          <TweakColor label="Accent" value={t.accent}
            options={['#2a6fdb', '#1f3a5c', '#1f8a5b', '#c47a1a']}
            onChange={v => setTweak('accent', v)} />
        </TweakSection>
        <TweakSection label="Language">
          <TweakRadio label="Mode" value={t.lang} options={[
            {value:'mix', label:'Mix'},
            {value:'en',  label:'EN'},
            {value:'bs',  label:'Bisaya'},
          ]} onChange={v => setTweak('lang', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

function ApproachCard() {
  return (
    <div className="kfx" style={{
      width: '100%', height: '100%',
      padding: 32, overflow: 'auto',
      background: 'var(--surface)',
    }}>
      <div className="eyebrow" style={{ marginBottom: 12 }}>Redesign approach</div>
      <div className="h1" style={{ marginBottom: 14, fontSize: 26 }}>From one long page → 4 focused screens</div>
      <p className="body" style={{ color: 'var(--text-2)', marginBottom: 22 }}>
        The current dashboard is a status report, a settings panel, and an action surface stacked on top of each other.
        It works at a desk but won't survive a phone. This redesign splits it by <em>job</em>, not by section.
      </p>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <Princ n="01" title="Today is the home screen" body="Open the app → see exactly what needs action today. Borrowers due, overdue, multa pending. One tap to record a bayad." />
        <Princ n="02" title="Borrowers drill in, not out" body="List rows stay narrow. All actions (palod, bayad, latepay, multa, close, archive) live inside the borrower's own page where there's room." />
        <Princ n="03" title="One source of truth per number" body="Total puhunan was shown 3 times. Now: hero on Money, recap on Settings. Each number lives in one place." />
        <Princ n="04" title="Bisaya stays for the verbs that matter" body="Palod, bayad, multa, than, puhunan, nakulha — these are how you already think about the business. UI chrome in English; toggle to fuller Bisaya if you prefer." />
        <Princ n="05" title="Same app on phone and laptop" body="Bottom-tab nav on mobile becomes a sidebar on desktop. Same screens, same data — just more room to breathe." />
      </div>

      <div style={{
        marginTop: 24, padding: 14,
        background: 'var(--accent-soft)', borderRadius: 12,
        color: 'var(--accent)', fontSize: 13, fontWeight: 500,
      }}>
        → Swipe through artboards on the right. Use the <strong>Tweaks</strong> toggle (top-right of toolbar) to switch theme, accent, and language.
      </div>
    </div>
  );
}

function Princ({ n, title, body }) {
  return (
    <div style={{ display: 'flex', gap: 12 }}>
      <div style={{
        width: 28, height: 28, borderRadius: 8, flexShrink: 0,
        background: 'var(--text)', color: 'var(--surface)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'JetBrains Mono', fontSize: 12, fontWeight: 700,
      }}>{n}</div>
      <div>
        <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 3 }}>{title}</div>
        <div style={{ fontSize: 13, color: 'var(--text-2)', lineHeight: 1.5 }}>{body}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
